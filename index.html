<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Text Bounce</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:monospace;
}

.text{
  position:absolute;
  white-space:nowrap;
  font-size:30px;
  font-weight:bold;
}

/* Tick xanh */
.tick{
  display:inline-block;
  width:28px;
  height:28px;
  background:#00c853;
  color:#fff;
  text-align:center;
  line-height:28px;
  border-radius:6px;
  margin-right:10px;
}
</style>
</head>

<body>

<script>
const texts=[
  {t:"Pew đẹp trai",c:"#00ff00"},
  {t:"Chị biển xấu gái",c:"#00bfff"}
];

let i=0;

// tạo chữ
const d=document.createElement("div");
d.className="text";
document.body.appendChild(d);

// vị trí ban đầu (QUAN TRỌNG)
let x=100, y=100;
d.style.left = x + "px";
d.style.top = y + "px";

// tốc độ chậm
let dx=1+Math.random()*1.5;
let dy=1+Math.random()*1.5;

// render nội dung
function render(){
  d.innerHTML = `<span class="tick">✔</span><span style="color:${texts[i].c}">${texts[i].t}</span>`;
}

// đổi câu mỗi 60s
setInterval(()=>{
  i=(i+1)%2;
  render();
},60000);

// chuyển động đập tường
function move(){
  const w=window.innerWidth;
  const h=window.innerHeight;
  const rect=d.getBoundingClientRect();

  x+=dx;
  y+=dy;

  if(x<=0 || x+rect.width>=w) dx*=-1;
  if(y<=0 || y+rect.height>=h) dy*=-1;

  d.style.left=x+"px";
  d.style.top=y+"px";

  requestAnimationFrame(move);
}

// chạy
render();   // 🔥 phải gọi trước
move();
</script>

</body>
</html>
