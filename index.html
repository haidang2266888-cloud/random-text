<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Random Moving Text</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
    }

    .text {
      position: absolute;
      white-space: nowrap;
      font-size: 18px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<script>
  const words = ["abc", "xyz", "hello", "code", "github", "web", "random"];

  function createText() {
    const text = document.createElement("div");
    text.className = "text";

    // Random word
    text.innerText = words[Math.floor(Math.random() * words.length)];

    // Random position (left → right)
    text.style.left = Math.random() * window.innerWidth + "px";

    // Random speed
    const duration = 3 + Math.random() * 5;
    text.style.animationDuration = duration + "s";

    // Random size
    text.style.fontSize = (12 + Math.random() * 24) + "px";

    document.body.appendChild(text);

    // Remove after animation
    setTimeout(() => {
      text.remove();
    }, duration * 1000);
  }

  // Create continuously
  setInterval(createText, 300);
</script>

</body>
</html>
