<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Random Moving Text</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
    }

    .text {
      position: absolute;
      white-space: nowrap;
      font-size: 18px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<script>
  // 2 câu bạn muốn
  const texts = [
    "Xóc Đĩa Tứ Linh",
    "Tài Xỉu Mini"
  ];

  let currentIndex = 0; // bắt đầu với câu đầu

  // Đổi câu mỗi 60 giây
  setInterval(() => {
    currentIndex = (currentIndex + 1) % texts.length;
  }, 60000);

  function createText() {
    const text = document.createElement("div");
    text.className = "text";

    // Hiển thị câu hiện tại
    text.innerText = texts[currentIndex];

    // Random vị trí ngang
    text.style.left = Math.random() * window.innerWidth + "px";

    // Random tốc độ
    const duration = 3 + Math.random() * 5;
    text.style.animationDuration = duration + "s";

    // Random size
    text.style.fontSize = (16 + Math.random() * 20) + "px";

    document.body.appendChild(text);

    // Xóa sau khi chạy xong
    setTimeout(() => {
      text.remove();
    }, duration * 1000);
  }

  // Tạo chữ liên tục
  setInterval(createText, 300);
</script>

</body>
</html>
